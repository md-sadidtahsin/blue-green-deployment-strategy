version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/react-app
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/build.sh
      timeout: 600
      runas: ec2-user
  ApplicationStart:
    - location: scripts/start_nginx.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      timeout: 300
      runas: root
